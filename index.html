<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <title>TYLGO — Tile Business OS</title>
    <meta
      name="description"
      content="The operating system for tile businesses. Manage showrooms, customers, rooms, tiles, and quotations — all in one place."
    />

    <!-- Favicon -->
    <link rel="icon" href="/tylgo-logo.png" type="image/png" />

    <!-- PWA: Theme & Colors -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="msapplication-TileColor" content="#1a1a2e" />

    <!-- PWA: iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TYLGO" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- PWA: Splash screens for iOS (prevents white flash on launch) -->
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TYLGO — Tile Business OS" />
    <meta
      property="og:description"
      content="The operating system for tile businesses. Manage showrooms, customers, rooms, tiles, and quotations."
    />
    <meta property="og:image" content="/tylgo-logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
